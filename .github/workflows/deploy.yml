name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # #region agent log
      - name: Debug log pre-build state
        run: |
          node -e "fetch('http://127.0.0.1:7933/ingest/b221d707-f9b4-420b-a614-5a214cad947c',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'e9f999'},body:JSON.stringify({sessionId:'e9f999',runId:process.env.GITHUB_RUN_ID,hypothesisId:'H2',location:'.github/workflows/deploy.yml:build',message:'Workflow reached pre-build step',data:{ref:process.env.GITHUB_REF,sha:process.env.GITHUB_SHA},timestamp:Date.now()})}).catch(()=>{})"
      # #endregion

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SHARE_CARD_URL: ${{ secrets.VITE_SHARE_CARD_URL }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}

      # #region agent log
      - name: Debug log pre-gh-pages publish
        run: |
          node -e "fetch('http://127.0.0.1:7933/ingest/b221d707-f9b4-420b-a614-5a214cad947c',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'e9f999'},body:JSON.stringify({sessionId:'e9f999',runId:process.env.GITHUB_RUN_ID,hypothesisId:'H5',location:'.github/workflows/deploy.yml:deploy',message:'Workflow reached gh-pages publish boundary',data:{publishBranch:'gh-pages',publishDir:'dist'},timestamp:Date.now()})}).catch(()=>{})"
      # #endregion

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf .deploy-pages
          mkdir -p .deploy-pages
          cp -R dist/. .deploy-pages/
          cd .deploy-pages
          touch .nojekyll

          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: ${GITHUB_SHA}"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
